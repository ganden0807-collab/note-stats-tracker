name: note-stats-tracker

on:
  schedule:
    - cron: '0 */4 * * *'  # 4時間おきに実行（1日1回でよければ '0 1 * * *' に変更）
  workflow_dispatch:        # 手動実行ボタンを追加

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Run Fetch Script
        env:
          NOTE_COOKIE: ${{ secrets.NOTE_COOKIE }}
          NOTE_USERNAME: ${{ secrets.NOTE_USERNAME }}
          COOKIE_SET_DATE: ${{ secrets.COOKIE_SET_DATE }}
        run: python scripts/fetch_stats.py
      - name: Run Analyze Script
        run: python scripts/analyze.py --articles data/articles.csv --out data/
      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/*.csv
          if ! git diff --staged --quiet; then
            git commit -m "Update note stats: $(date +'%Y-%m-%d %H:%M')"
            git pull --rebase origin main　--force
            git push origin main
          fi
